<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bot Dashboard</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0c10;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 16px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #ff7e3c, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .username-badge {
            background: #11131f;
            border: 1px solid #2a2d3e;
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffb347;
            font-weight: 500;
        }
        .btn-primary {
            background: linear-gradient(95deg, #f05f40, #f7a81e);
            border: none;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-secondary {
            background: #1e2130;
            border: 1px solid #2a2d3e;
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            color: #ccc;
        }
        .btn-danger {
            background: #3a1e1e;
            color: #f87171;
            border: 1px solid #5a2a2a;
        }
        .bots-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .bot-card {
            background: #11131f;
            border: 1px solid #2a2d3e;
            border-radius: 24px;
            padding: 18px;
            transition: 0.2s;
        }
        .bot-card:hover { border-color: #ff7e3c; box-shadow: 0 0 12px rgba(255,126,60,0.1); }
        .bot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .bot-name {
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
        }
        .status {
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 40px;
            font-weight: bold;
        }
        .status-running { background: #1e3a1e; color: #4ade80; }
        .status-stopped { background: #3a1e1e; color: #f87171; }
        .info-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #8a8f9e;
            margin-bottom: 12px;
            border-top: 1px solid #1e2130;
            padding-top: 10px;
        }
        .creds-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .creds-row input {
            flex: 1;
            min-width: 120px;
            background: #1a1d2b;
            border: 1px solid #2a2d3e;
            border-radius: 40px;
            padding: 8px 12px;
            color: white;
            font-size: 0.8rem;
        }
        .bot-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }
        .toggle-switch {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.75rem;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #1e2130;
            color: #aaa;
        }
        .toggle-switch input {
            width: 44px;
            height: 22px;
            appearance: none;
            background: #2a2d3e;
            border-radius: 22px;
            position: relative;
            cursor: pointer;
        }
        .toggle-switch input:checked { background: #ff7e3c; }
        .toggle-switch input::before {
            content: '';
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 3px;
            transition: 0.2s;
        }
        .toggle-switch input:checked::before { transform: translateX(21px); }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #11131f;
            border-radius: 28px;
            width: 90%;
            max-width: 500px;
            max-height: 80%;
            display: flex;
            flex-direction: column;
            border: 1px solid #ff7e3c;
        }
        .modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid #2a2d3e;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            color: white;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            font-family: monospace;
            font-size: 12px;
            background: #0a0c10;
            color: #8affa0;
            white-space: pre-wrap;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: #ff7e3c;
            color: black;
            padding: 12px 20px;
            border-radius: 60px;
            text-align: center;
            z-index: 1100;
            display: none;
            font-weight: bold;
        }
        @media (max-width: 480px) {
            .bots-grid { grid-template-columns: 1fr; }
            .creds-row input { min-width: 100px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>BOT DASHBOARD</h1>
        <div style="display: flex; gap: 10px; align-items: center;">
            <span class="username-badge" id="usernameDisplay"></span>
            <button onclick="logout()" class="btn-secondary">Logout</button>
        </div>
    </div>
    <button class="btn-primary" onclick="showCreateModal()">✨ + Create New Bot</button>
    <div id="botsGrid" class="bots-grid">Loading...</div>
</div>

<!-- Create Bot Modal -->
<div id="createModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span>New Bot</span>
            <button onclick="closeCreateModal()" style="background:none; border:none; color:white; font-size:1.2rem;">✖</button>
        </div>
        <div class="modal-body">
            <input type="text" id="botName" placeholder="Bot Name" style="width:100%; padding:12px; border-radius:60px; background:#1a1d2b; border:1px solid #2a2d3e; color:white; margin-bottom:15px;">
            <button onclick="createBot()" class="btn-primary" style="width:100%;">Create</button>
        </div>
    </div>
</div>

<!-- Logs Modal -->
<div id="logsModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <span id="logBotName">Logs</span>
            <button onclick="closeLogsModal()" style="background:none; border:none; color:white; font-size:1.2rem;">✖</button>
        </div>
        <div id="logContent" class="modal-body">Waiting for logs...</div>
    </div>
</div>

<div id="toast" class="toast"></div>

<script>
    const socket = io();
    let currentLogBotId = null;
    let logInterval = null;

    async function loadBots() {
        const res = await fetch('/api/bots');
        const bots = await res.json();
        const container = document.getElementById('botsGrid');
        if (Object.keys(bots).length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px; color:#6b7f99;">No bots. Click "Create New Bot".</div>';
            return;
        }
        let html = '';
        for (let [id, bot] of Object.entries(bots)) {
            const statusClass = bot.running ? 'status-running' : 'status-stopped';
            const statusText = bot.running ? '🟢 RUNNING' : '🔴 STOPPED';
            const createdDate = new Date(bot.created_at).toLocaleDateString();
            html += `
                <div class="bot-card">
                    <div class="bot-header">
                        <span class="bot-name">${escapeHtml(bot.bot_name)}</span>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="info-row">
                        <span>📅 ${createdDate}</span>
                        <span>⚡ Bot ID: ${id.substring(0, 12)}...</span>
                    </div>
                    <div class="info-row" style="margin-top:-5px;">
                        <span>🔧 WEB Port: 8080</span>
                        <span>📁 Files: Uploaded</span>
                    </div>
                    <div class="creds-row">
                        <input type="text" id="uid_${id}" placeholder="UID" value="${escapeHtml(bot.uid || '')}">
                        <input type="password" id="pw_${id}" placeholder="Password" value="${escapeHtml(bot.password || '')}">
                        <button class="btn-secondary" onclick="saveCreds('${id}')" style="background:#ff7e3c; color:black;">Save</button>
                    </div>
                    <div class="bot-actions">
                        <button class="btn-secondary" onclick="controlBot('${id}', 'start')">▶ Start</button>
                        <button class="btn-secondary" onclick="controlBot('${id}', 'stop')">■ Stop</button>
                        <button class="btn-secondary" onclick="controlBot('${id}', 'restart')">🔄 Restart</button>
                        <button class="btn-secondary" onclick="openLogs('${id}', '${escapeHtml(bot.bot_name)}')">📡 Logs</button>
                        <button class="btn-secondary btn-danger" onclick="deleteBot('${id}')">🗑 Delete</button>
                    </div>
                    <div class="toggle-switch">
                        <span>🔄 Auto Restart (24h)</span>
                        <input type="checkbox" id="auto_${id}" ${bot.auto_restart ? 'checked' : ''} onchange="toggleAutoRestart('${id}', this.checked)">
                    </div>
                </div>
            `;
        }
        container.innerHTML = html;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    async function saveCreds(botId) {
        const uid = document.getElementById(`uid_${botId}`).value.trim();
        const password = document.getElementById(`pw_${botId}`).value;
        const res = await fetch('/api/set_creds', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bot_id: botId, uid, password })
        });
        const data = await res.json();
        if (data.status === 'success') toast('Credentials saved');
        else toast('Save failed');
    }

    async function controlBot(botId, action) {
        const res = await fetch(`/api/${action}_bot`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bot_id: botId })
        });
        const data = await res.json();
        if (data.status === 'success') {
            loadBots();
            toast(`${action} successful`);
        } else toast(data.error || 'Action failed');
    }

    async function deleteBot(botId) {
        if (!confirm('Delete this bot permanently?')) return;
        await fetch(`/api/delete_bot?bot_id=${botId}`, { method: 'DELETE' });
        loadBots();
    }

    async function toggleAutoRestart(botId, value) {
        await fetch('/api/toggle_auto_restart', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bot_id: botId, value })
        });
        toast(value ? 'Auto restart ON (every 24h)' : 'Auto restart OFF');
    }

    function showCreateModal() { document.getElementById('createModal').classList.add('active'); }
    function closeCreateModal() { document.getElementById('createModal').classList.remove('active'); }
    async function createBot() {
        const name = document.getElementById('botName').value.trim();
        if (!name) { toast('Enter bot name'); return; }
        const res = await fetch('/api/create_bot', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ bot_name: name })
        });
        const data = await res.json();
        if (data.status === 'success') {
            closeCreateModal();
            document.getElementById('botName').value = '';
            loadBots();
        } else toast(data.error || 'Create failed');
    }

    function openLogs(botId, botName) {
        currentLogBotId = botId;
        document.getElementById('logBotName').innerText = `Logs: ${botName}`;
        document.getElementById('logsModal').classList.add('active');
        fetchLogs(botId);
        if (logInterval) clearInterval(logInterval);
        logInterval = setInterval(() => fetchLogs(botId), 3000);
    }
    async function fetchLogs(botId) {
        const res = await fetch(`/api/logs/${botId}`);
        const text = await res.text();
        const logDiv = document.getElementById('logContent');
        logDiv.innerText = text || 'No logs yet...';
        logDiv.scrollTop = logDiv.scrollHeight;
    }
    function closeLogsModal() {
        document.getElementById('logsModal').classList.remove('active');
        if (logInterval) clearInterval(logInterval);
    }

    function toast(msg) {
        const el = document.getElementById('toast');
        el.innerText = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 2500);
    }

    async function logout() {
        await fetch('/logout');
        window.location.href = '/login';
    }

    async function loadUsername() {
        const res = await fetch('/api/bots');
        if (res.ok) {
            const bots = await res.json();
            const firstBot = Object.values(bots)[0];
            if (firstBot && firstBot.username) {
                document.getElementById('usernameDisplay').innerText = firstBot.username;
            } else {
                document.getElementById('usernameDisplay').innerText = 'User';
            }
        }
    }

    socket.on('new_log', (msg) => {
        if (currentLogBotId === msg.bot_id) {
            const logDiv = document.getElementById('logContent');
            const line = document.createElement('div');
            line.innerText = `[${new Date().toLocaleTimeString()}] ${msg.data}`;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
        }
    });
    socket.on('status_update', () => { loadBots(); });

    loadUsername();
    loadBots();
    setInterval(loadBots, 8000);
</script>
</body>
</html>
